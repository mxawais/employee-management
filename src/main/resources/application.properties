spring.application.name=employee-management

server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/employee_db}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:employee}

spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:employee123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.defaults.enabled=true
